<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZackType</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 240px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #1e1e1e;
        color: #f1f1f1;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      .version-badge {
        font-size: 10px;
        background: #444;
        padding: 2px 6px;
        border-radius: 12px;
        color: #aaa;
        font-weight: 500;
      }

      p {
        font-size: 12px;
        color: #aaa;
        line-height: 1.5;
        margin: 0 0 12px 0;
      }

      .open-btn {
        width: 100%;
        padding: 10px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s;
      }

      .open-btn:hover {
        background: #2563eb;
      }

      .footer {
        margin-top: 12px;
        text-align: center;
        font-size: 11px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>ZackType</h1>
      <span class="version-badge">v1.0.0</span>
    </div>
    <p>
      Open a Google Docs document to use ZackType. The floating panel will
      appear when you click the extension icon on a Google Docs page.
    </p>
    <button class="open-btn" id="openDocsBtn">Open Google Docs</button>
    <div class="footer">Created by techzt13</div>
    <script>
      document.getElementById('openDocsBtn').addEventListener('click', () => {
        chrome.tabs.create({ url: 'https://docs.google.com/document' });
      });
    </script>
  </body>
</html>
